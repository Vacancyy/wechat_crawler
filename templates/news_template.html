<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{date}}（{{weekday}}）三分钟信息早餐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.8;
            font-size: 17px;
        }
        .container {
            max-width: 677px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            padding-bottom: 50px;
        }
        .header {
            padding: 30px 20px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .header h1 {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .meta {
            font-size: 14px;
            color: #999;
        }
        .meta span { margin: 0 8px; }
        .author { color: #576b95; }
        
        .content { padding: 20px; }
        .content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 15px auto;
            border-radius: 4px;
        }
        .content p {
            margin-bottom: 12px;
            text-align: justify;
            text-indent: 0;
        }
        .section-title {
            font-weight: bold;
            color: #c00000;
            margin: 25px 0 15px;
            font-size: 17px;
            padding-bottom: 8px;
            border-bottom: 2px solid #c00000;
        }
        .news-item {
            margin-bottom: 10px;
            line-height: 1.9;
        }
        .tag { color: #576b95; font-weight: 500; }
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #ddd, transparent);
            margin: 25px 0;
        }
        .separator-img { margin: 20px 0 !important; }
        .section-divider {
            text-align: center;
            margin: 30px 0;
            padding: 10px 0;
        }
        .section-divider img {
            max-width: 80%;
            height: auto;
            border-radius: 8px;
        }
        .template-divider {
            display: block;
            margin: 25px auto;
            max-width: 100%;
        }
        .title-image {
            text-align: center;
            margin: 20px 0;
        }
        .title-image img, .section-title-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 15px auto;
        }
        
        .footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 14px;
            color: #999;
            border-top: 1px solid #eee;
            margin-top: 30px;
        }
        

        
        /* 模板素材样式 */
        .template-header {
            width: 100%;
            margin: 0 0 20px 0;
            border-radius: 0;
        }
        .template-divider {
            width: 100%;
            margin: 25px auto;
            height: auto;
        }
        .template-footer {
            max-width: 200px;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{date}}（{{weekday}}）三分钟信息早餐</h1>
            <div class="meta">
                <span class="author">每日信息早餐</span>
                <span>{{date}} 06:30</span>
                <span>江苏南京</span>
            </div>
        </div>
        
        <div class="content">
            {{header_image}}
            {{news_content}}
            <div class="divider"></div>
            {{template_footer}}
        </div>
        
        <div class="footer">
            <p style="font-size: 12px; color: #999;">每日信息早餐</p>
            <p style="margin-top: 10px; font-size: 12px; color: #999;">生成于 {{generated_time}}</p>
        </div>
    </div>
</body>
</html>
