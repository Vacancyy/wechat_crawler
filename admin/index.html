          <button class="btn-icon" onclick="insertImageAfter('${item.id}')" title="在下方插入图片">图</button>
          <button class="btn-icon" onclick="replaceContentImage('${item.id}')" title="替换">换</button>
          <button class="btn-icon" onclick="deleteItem('${item.id}')" title="删除">删</button>
        `;
      } else if (item.type === 'ad') {
        contentHtml = `<span style="color: #ffd700; font-weight: bold;">${item.content || '广告位'}</span>`;
        actionsHtml = `
          <button class="btn-icon" onclick="deleteItem('${item.id}')" title="删除">删</button>
        `;
      } else {
        contentHtml = item.editing 
          ? `<textarea rows="3" style="width: 100%;" oninput="updateItem('${item.id}', this.value)">${item.content}</textarea>` 
          : `<span style="cursor: pointer; line-height: 1.6;" onclick="startEditing('${item.id}')">${item.content}</span>`;
        actionsHtml = `
          <button class="btn-icon" onclick="startEditing('${item.id}')" title="编辑">编</button>
          <button class="btn-icon" onclick="insertSectionAfter('${item.id}')" title="在下方插入章节" style="color:#c00000;">章</button>
          <button class="btn-icon" onclick="insertParagraphAfter('${item.id}')" title="在下方插入段落">段</button>
          <button class="btn-icon" onclick="insertImageAfter('${item.id}')" title="在下方插入图片">图</button>
          <button class="btn-icon" onclick="deleteItem('${item.id}')" title="删除">删</button>
        `;
      }
      
      return `
        <div class="content-item ${item.selected ? 'selected' : ''}" 
             data-id="${item.id}" 
             draggable="true"
             ondragstart="event.dataTransfer.setData('text/plain', '${item.id}')">
          <div class="drag-handle" title="拖拽排序">⋮⋮</div>
          
          <div class="item-type">
            <span class="type-badge ${item.type}">${typeLabels[item.type]}</span>
            <span>#${index + 1}</span>
          </div>
          
          <div class="item-content ${item.editing ? 'editing' : ''}">
            ${contentHtml}
          </div>
          
          <div class="item-actions">
            ${actionsHtml}
          </div>
        </div>
      `;
    }
    
    // 在指定项后插入章节
    function insertSectionAfter(id) {
      const index = state.contentItems.findIndex(i => i.id === id);
      if (index >= 0) {
        const newSection = {
          id: `item-${Date.now()}`,
          type: 'section',
          content: '',
          editing: true,
          selected: false
        };
        state.contentItems.splice(index + 1, 0, newSection);
        renderContentList();
        refreshPreview();
      }
    }
    
    // 在指定项后插入段落
    function insertParagraphAfter(id) {
      const index = state.contentItems.findIndex(i => i.id === id);
      if (index >= 0) {
        const newParagraph = {
          id: `item-${Date.now()}`,
          type: 'news',
          content: '',
          editing: true,
          selected: false
        };
        state.contentItems.splice(index + 1, 0, newParagraph);
        renderContentList();
        refreshPreview();
      }
    }
    
    // 在指定项后插入图片
    function insertImageAfter(id) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          const index = state.contentItems.findIndex(i => i.id === id);
          if (index >= 0) {
            const newImage = {
              id: `item-${Date.now()}`,
              type: 'image',
              src: event.target.result,
              filename: file.name,
              selected: false
            };
            state.contentItems.splice(index + 1, 0, newImage);
            renderContentList();
            refreshPreview();
          }
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }
    
    // 替换内容编辑器中的图片
    function replaceContentImage(id) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          const item = state.contentItems.find(i => i.id === id);
          if (item) {
            item.src = event.target.result;
            item.filename = file.name;
            renderContentList();
            refreshPreview();
          }
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }
    
    // 替换副标题图片
    async function replaceSubtitleImage(id) {
      const item = state.contentItems.find(i => i.id === id);
      if (!item) return;
      
      // 弹出选择对话框
      showModal('替换副标题图片', `
        <div style="padding: 10px;">
          <p style="margin-bottom: 10px;">当前副标题: <strong>${item.filename}</strong></p>
          <div style="text-align: center; margin-bottom: 15px;">
            <img src="${item.src}" style="max-width: 100%; max-height: 100px; border-radius: 4px;">
          </div>
          <p style="margin-bottom: 8px;">选择新的副标题图片:</p>
          <select id="new-subtitle-select" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border);">
            <option value="">-- 从素材库选择 --</option>
          </select>
          <div style="margin-top: 10px; text-align: center;">
            <button class="btn btn-sm" onclick="document.getElementById('subtitle-file-input').click()">上传新图片</button>
            <input type="file" id="subtitle-file-input" accept="image/*" style="display: none;" onchange="handleSubtitleUpload(this.files[0], '${id}')">
          </div>
        </div>
      `, [
        { text: '取消', class: 'btn', onclick: 'closeModal()' },
        { text: '替换', class: 'btn btn-primary', onclick: `confirmReplaceSubtitle('${id}')` }
      ]);
      
      // 加载通用图片库列表
      try {
        const res = await fetch('/api/upload/common/list');
        const data = await res.json();
        if (data.success) {
          const select = document.getElementById('new-subtitle-select');
          data.data.forEach(img => {
            const opt = document.createElement('option');
            opt.value = img.filename;
            opt.textContent = img.filename;
            select.appendChild(opt);
          });
        }
      } catch (e) {}
    }
    
    // 处理副标题图片上传
    function handleSubtitleUpload(file, id) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        // 上传到通用图片库
        fetch('/api/upload/common', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: file.name, imageData: event.target.result })
        }).then(res => res.json()).then(data => {
          if (data.success) {
            document.getElementById('new-subtitle-select').value = data.filename;
            // 添加新选项
            const select = document.getElementById('new-subtitle-select');
            if (!select.querySelector(`option[value="${data.filename}"]`)) {
              const opt = document.createElement('option');
              opt.value = data.filename;
              opt.textContent = data.filename;
              select.appendChild(opt);
              select.value = data.filename;
            }
          }
        });
      };
      reader.readAsDataURL(file);
    }
    
    // 确认替换副标题
    async function confirmReplaceSubtitle(id) {
      const select = document.getElementById('new-subtitle-select');
      const filename = select.value;
      if (!filename) {
        alert('请选择或上传图片');
        return;
      }
      
      const item = state.contentItems.find(i => i.id === id);
      if (item) {
        item.filename = filename;
        item.src = `/output/common/${filename}`;
        renderContentList();
        refreshPreview();
      }
      closeModal();
    }
    
    // 显示图片编辑器
    function showImageEditor(id) {
      const item = state.contentItems.find(i => i.id === id);
      if (!item) return;
      
      const width = item.width || 100;
      const align = item.align || 'center';
      const caption = item.caption || '';
      
      showModal('图片编辑', `
        <div style="text-align: center; margin-bottom: 16px;">
          <img src="${item.src}" id="image-preview" style="max-width: 100%; max-height: 300px; border-radius: 8px;">
        </div>
        <div class="form-group">
          <label>图片宽度</label>
          <input type="range" id="image-width" min="30" max="100" value="${width}" 
                 oninput="document.getElementById('width-value').textContent = this.value + '%'; updateImagePreview()">
          <span id="width-value" style="margin-left: 10px;">${width}%</span>
        </div>
        <div class="form-group">
          <label>对齐方式</label>
          <select id="image-align" onchange="updateImagePreview()">
            <option value="left" ${align === 'left' ? 'selected' : ''}>左对齐</option>
            <option value="center" ${align === 'center' ? 'selected' : ''}>居中</option>
            <option value="right" ${align === 'right' ? 'selected' : ''}>右对齐</option>
          </select>
        </div>
        <div class="form-group">
          <label>图片说明</label>
          <input type="text" id="image-caption" value="${caption}" placeholder="可选：添加图片说明">
        </div>
        <div class="form-group">
          <label>替换图片</label>
          <input type="file" id="replace-image-input" accept="image/*">
        </div>
      `, [
        { text: '取消', class: 'btn' },
        { text: '保存', class: 'btn btn-primary', onclick: `saveImageEdit('${id}')` }
      ]);
    }
    
    function updateImagePreview() {
      const preview = document.getElementById('image-preview');
      const width = document.getElementById('image-width').value;
      
      if (preview) {
        preview.style.maxWidth = width + '%';
      }
    }
    
    async function saveImageEdit(id) {
      const item = state.contentItems.find(i => i.id === id);
      if (!item) return;
      
      // 保存编辑属性
      item.width = parseInt(document.getElementById('image-width').value);
      item.align = document.getElementById('image-align').value;
      item.caption = document.getElementById('image-caption').value;
      
      // 检查是否需要替换图片
      const fileInput = document.getElementById('replace-image-input');
      if (fileInput && fileInput.files && fileInput.files[0]) {
        const file = fileInput.files[0];
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('读取失败'));
          reader.readAsDataURL(file);
        });
        item.src = base64;
        item.filename = file.name;
      }
      
      closeModal();
      renderContentList();
      refreshPreview();
    }
    
    function bindDragEvents() {
      document.querySelectorAll('.content-item').forEach(item => {
        item.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', e.target.dataset.id);
        });
        item.addEventListener('dragover', (e) => e.preventDefault());
        item.addEventListener('drop', (e) => {
          e.preventDefault();
          const dragId = e.dataTransfer.getData('text/plain');
          const dropId = item.dataset.id;
          if (dragId !== dropId) reorderItems(dragId, dropId);
        });
      });
    }
    
    function reorderItems(dragId, dropId) {
      const dragIndex = state.contentItems.findIndex(i => i.id === dragId);
      const dropIndex = state.contentItems.findIndex(i => i.id === dropId);
      if (dragIndex > -1 && dropIndex > -1) {
        const [removed] = state.contentItems.splice(dragIndex, 1);
        state.contentItems.splice(dropIndex, 0, removed);
        renderContentList();
        refreshPreview();
      }
    }
    
    function updateStats() {
      document.getElementById('item-count').textContent = state.contentItems.length;
      document.getElementById('image-count').textContent = state.contentItems.filter(i => i.type === 'image').length;
      document.getElementById('char-count').textContent = state.contentItems.reduce((sum, i) => sum + (i.content?.length || 0), 0);
    }
    
    function toggleSelect(id) {
      const item = state.contentItems.find(i => i.id === id);
      if (item) {
        item.selected = !item.selected;
        renderContentList();
      }
    }
    
    function startEditing(id) {
      state.contentItems.forEach(i => i.editing = false);
      const item = state.contentItems.find(i => i.id === id);
      if (item) {
        item.editing = true;
        renderContentList();
      }
    }
    
    function stopEditing(id) {
      const item = state.contentItems.find(i => i.id === id);
      if (item) {
        item.editing = false;
        refreshPreview();
      }
    }
    
    function updateItem(id, value) {
      const item = state.contentItems.find(i => i.id === id);
      if (item) {
        item.content = value;
        updateStats();
        refreshPreview(); // 实时更新预览
      }
    }
    
    function deleteItem(id) {
      state.contentItems = state.contentItems.filter(i => i.id !== id);
      renderContentList();
      refreshPreview();
    }
    
    function deleteSelected() {
      const selected = state.contentItems.filter(i => i.selected);
      if (selected.length === 0) {
        alert('请先选择要删除的项目');
        return;
      }
      if (confirm(`确定删除选中的 ${selected.length} 项？`)) {
        state.contentItems = state.contentItems.filter(i => !i.selected);
        renderContentList();
        refreshPreview();
      }
    }
    
    function moveSelectedUp() {
      const index = state.contentItems.findIndex(i => i.selected);
      if (index <= 0) return alert('无法上移');
      [state.contentItems[index - 1], state.contentItems[index]] = [state.contentItems[index], state.contentItems[index - 1]];
      renderContentList();
      refreshPreview();
    }
    
    function moveSelectedDown() {
      const index = state.contentItems.findIndex(i => i.selected);
      if (index < 0 || index >= state.contentItems.length - 1) return alert('无法下移');
      [state.contentItems[index], state.contentItems[index + 1]] = [state.contentItems[index + 1], state.contentItems[index]];
      renderContentList();
      refreshPreview();
    }
    
    function addSection() {
      state.contentItems.push({
        id: `item-${Date.now()}`,
        type: 'section',
        content: '新章节',
        selected: false,
        editing: true
      });
      renderContentList();
    }
    
    function addNewsItem() {
      state.contentItems.push({
        id: `item-${Date.now()}`,
        type: 'news',
        content: '在此输入新闻内容...',
        selected: false,
        editing: true
      });
      renderContentList();
    }
    
    function insertImage() {
      if (!state.currentDate || state.images.length === 0) {
        alert('请先在图片管理页面加载图片');
        return;
      }
      
      const selected = state.images.filter(i => i.selected);
      if (selected.length === 0) {
        alert('请先选择图片（在图片管理页面）');
        return;
      }
      
      selected.forEach(img => {
        state.contentItems.push({
          id: `item-${Date.now()}-${Math.random()}`,
          type: 'image',
          src: img.src,
          content: img.filename,
          selected: false
        });
      });
      
      renderContentList();
      refreshPreview();
    }
    
    function insertAd() {
      state.contentItems.push({
        id: `item-${Date.now()}`,
        type: 'ad',
        content: 'iPhone 17 Pro Max',
        selected: false
      });
      renderContentList();
      refreshPreview();
    }
    
    function refreshPreview() {
      const frame = document.getElementById('preview-frame');
      if (!frame) return;
      
      // 如果有选中的日期，生成实时预览
      if (state.currentDate && state.currentDate !== 'common') {
        // 根据当前编辑内容生成预览HTML
        const previewHtml = generatePreviewHtml();
        frame.srcdoc = previewHtml;
      }
    }
    
    // 生成预览HTML（基于当前编辑内容）
    function generatePreviewHtml() {
      let contentHtml = '';
      
      state.contentItems.forEach(item => {
        if (item.type === 'section') {
          contentHtml += `<p class="section-title" style="color: #c00000; font-weight: bold; font-size: 18px; margin: 20px 0 10px;">${item.content}</p>\n`;
        } else if (item.type === 'subtitle') {
          // 副标题图片：使用绝对路径（srcdoc iframe 基础URL是当前页面）
          let imgSrc = item.src;
          // 确保 srcdoc 中的 iframe 能正确加载图片（使用完整绝对路径）
          contentHtml += `<div style="text-align: center; margin: 15px 0;"><img src="${imgSrc}" style="max-width: 100%;"></div>\n`;
        } else if (item.type === 'news') {
          contentHtml += `<p style="margin: 10px 0; line-height: 1.8;">${item.content}</p>\n`;
        } else if (item.type === 'image') {
          const width = item.width || 100;
          const align = item.align || 'center';
          const caption = item.caption || '';
          // 图片：保持原始路径（srcdoc 需要绝对路径才能正确加载）
          let imgSrc = item.src;
          // 如果是 data: URL（本地上传的），直接使用
          // 如果是服务器路径，保持绝对路径
          contentHtml += `<div style="text-align: ${align}; margin: 15px 0;"><img src="${imgSrc}" style="max-width: ${width}%;"></div>\n`;
          if (caption) {
            contentHtml += `<p style="font-size: 12px; color: #999; text-align: center;">${caption}</p>\n`;
          }
        }
      });
      
      return `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 677px; margin: 0 auto; background: #fff; }
    p { margin: 10px 0; line-height: 1.8; }
    img { max-width: 100%; }
  </style>
</head>
<body>
  <div class="content">
    ${contentHtml}
  </div>
</body>
</html>`;
    }
    
    // ============ 模态框 ============
    function showModal(title, content, buttons) {
      document.getElementById('modal-container').innerHTML = `
        <div class="modal">
          <div class="modal-content">
            <div class="modal-header">
              <h3>${title}</h3>
              <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">${content}</div>
            <div class="modal-footer">${buttons.map(b => `<button class="${b.class}" onclick="${b.onclick || 'closeModal()'}">${b.text}</button>`).join('')}</div>
          </div>
        </div>
      `;
    }
    
    function closeModal() {
      document.getElementById('modal-container').innerHTML = '';
    }
    
    // ============ 导出功能 ============
    function showExportModal() {
      if (!state.currentDate) {
        alert('请先选择日期');
        return;
      }
      
      showModal('导出 HTML', `
        <div class="export-modal-content">
          <div class="export-option" onclick="exportSingleHTML()">
            <div class="export-option-icon">📄</div>
            <div class="export-option-info">
              <h4>导出当前日期</h4>
              <p>导出 ${state.currentDate} 的完整 HTML 文件</p>
            </div>
          </div>
          <div class="export-option" onclick="showBatchExport()">
            <div class="export-option-icon">📦</div>
            <div class="export-option-info">
              <h4>批量导出</h4>
              <p>选择日期范围，批量导出多日新闻</p>
            </div>
          </div>
        </div>
      `, [{ text: '取消', class: 'btn', onclick: 'closeModal()' }]);
    }
    
    async function exportSingleHTML() {
      closeModal();
      
      // 先保存当前内容
      await saveContent();
      
      // 获取 HTML 内容
      try {
        const res = await fetch(`/output/${state.currentDate}/完整版.html`);
        if (!res.ok) {
          alert('导出失败：无法获取 HTML 内容');
          return;
        }
        
        const html = await res.text();
        
        // 创建下载
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${state.currentDate}.html`;
        a.click();
        URL.revokeObjectURL(url);
        
        alert('✅ 导出成功！');
      } catch (e) {
        alert('导出失败：' + e.message);
      }
    }
    
    function showBatchExport() {
      closeModal();
      
      // 获取所有可选日期
      const dates = state.articles.map(a => a.date).sort().reverse();
      
      showModal('批量导出', `
        <div class="export-modal-content">
          <div class="form-group">
            <label>选择日期（勾选要导出的日期）</label>
            <div style="max-height: 300px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; padding: 10px;">
              ${dates.map(d => `
                <div style="padding: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;">
                  <input type="checkbox" id="export-${d}" value="${d}">
                  <label for="export-${d}" style="cursor: pointer;">${d}</label>
                </div>
              `).join('')}
            </div>
          </div>
          <div id="export-progress" style="display: none;">
            <div class="export-progress">
              <div class="export-progress-bar" id="export-progress-bar" style="width: 0%"></div>
            </div>
            <p id="export-status" style="margin-top: 8px; font-size: 13px; color: var(--text-light);">准备导出...</p>
          </div>
        </div>
      `, [
        { text: '取消', class: 'btn', onclick: 'closeModal()' },
        { text: '开始导出', class: 'btn btn-primary', onclick: 'startBatchExport()' }
      ]);
    }
    
    async function startBatchExport() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"][id^="export-"]:checked');
      const selectedDates = Array.from(checkboxes).map(cb => cb.value);
      
      if (selectedDates.length === 0) {
        alert('请选择要导出的日期');
        return;
      }
      
      document.getElementById('export-progress').style.display = 'block';
      const progressBar = document.getElementById('export-progress-bar');
      const statusText = document.getElementById('export-status');
      
      let completed = 0;
      const total = selectedDates.length;
      
      for (const date of selectedDates) {
        try {
          const res = await fetch(`/output/${date}/完整版.html`);
          if (res.ok) {
            const html = await res.text();
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${date}.html`;
            a.click();
            URL.revokeObjectURL(url);
          }
        } catch (e) {
          console.error(`导出 ${date} 失败:`, e);
        }
        
        completed++;
        progressBar.style.width = `${(completed / total) * 100}%`;
        statusText.textContent = `已导出 ${completed}/${total}...`;
        
        // 等待一小段时间避免浏览器阻止多个下载
        await new Promise(r => setTimeout(r, 500));
      }
      
      statusText.textContent = `✅ 完成！已导出 ${completed} 个文件`;
      setTimeout(closeModal, 2000);
    }
    
    // ============ 新增段落功能 ============
    function addNewParagraph() {
      const newId = `item-${Date.now()}`;
      state.contentItems.push({
        id: newId,
        type: 'news',
        content: '',
        editing: true,
        selected: false
      });
      renderContentList();
    }
    
    function addNewSection() {
      const newId = `item-${Date.now()}`;
      state.contentItems.push({
        id: newId,
        type: 'section',
        content: '',
        editing: true,
        selected: false
      });
      renderContentList();
    }
    
    // 初始化
    navigateTo('dashboard');
  </script>
</body>
</html>
