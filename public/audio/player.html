<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新闻播报</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.player {
  background: #fff; border-radius: 20px; padding: 30px; width: 90%; max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
}
.title { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 5px; }
.date { font-size: 14px; color: #999; margin-bottom: 25px; }
.cover {
  width: 180px; height: 180px; border-radius: 50%; margin: 0 auto 25px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  animation: spin 8s linear infinite paused;
}
.cover.playing { animation-play-state: running; }
.cover-icon { font-size: 60px; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
.btn {
  width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer;
  background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
}
.btn:hover { opacity: 0.9; }
.progress-bar {
  width: 100%; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 10px; cursor: pointer;
}
.progress { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 2px; width: 0%; }
.time { display: flex; justify-content: space-between; font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="player">
  <div class="title">新闻播报</div>
  <div class="date" id="dateText"></div>
  <div class="cover" id="cover">
    <span class="cover-icon">🎙️</span>
  </div>
  <div class="controls">
    <button class="btn" onclick="audio.currentTime -= 10">⏪</button>
    <button class="btn" id="playBtn" onclick="togglePlay()" style="width:60px;height:60px;font-size:24px;">▶</button>
    <button class="btn" onclick="audio.currentTime += 10">⏩</button>
  </div>
  <div class="progress-bar" onclick="seek(event)">
    <div class="progress" id="progress"></div>
  </div>
  <div class="time">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>
</div>
<audio id="audio" preload="auto"></audio>
<script>
const audio = document.getElementById('audio');
const params = new URLSearchParams(window.location.search);
const date = params.get('date') || '';
const src = params.get('src') || '';
document.getElementById('dateText').textContent = date;
audio.src = src;
function togglePlay() {
  if (audio.paused) { audio.play(); document.getElementById('playBtn').textContent = '⏸'; document.getElementById('cover').classList.add('playing'); }
  else { audio.pause(); document.getElementById('playBtn').textContent = '▶'; document.getElementById('cover').classList.remove('playing'); }
}
audio.addEventListener('timeupdate', () => {
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('currentTime').textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('duration').textContent = fmt(audio.duration);
});
function fmt(s) { const m = Math.floor(s/60); return m + ':' + String(Math.floor(s%60)).padStart(2,'0'); }
function seek(e) { const rect = e.target.getBoundingClientRect(); const pct = (e.clientX - rect.left) / rect.width; audio.currentTime = pct * audio.duration; }
</script>
</body>
</html>
